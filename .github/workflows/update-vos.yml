name: 自动抓取VOS卖家热议

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-vos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 抓取卖家热议
        run: python fetch-vos.py
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vos-data.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: 更新VOS卖家热议 $(date +%Y-%m-%d)"
            git push
          fi
